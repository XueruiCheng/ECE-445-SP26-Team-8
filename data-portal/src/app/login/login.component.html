<div class="login-page">
  <div class="login-panel">
    <div class="login-content">
      <div class="brand">
        <h1 class="login-title">Illinois Quantum Portal</h1>
        <p class="login-subtitle">Sign in to submit your researcher profile</p>
      </div>

      <div class="oauth-section">
        <button class="oauth-btn" (click)="signInWithMicrosoft()">
          <svg class="oauth-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <rect x="1" y="1" width="10" height="10" fill="#F25022"/>
            <rect x="13" y="1" width="10" height="10" fill="#7FBA00"/>
            <rect x="1" y="13" width="10" height="10" fill="#00A4EF"/>
            <rect x="13" y="13" width="10" height="10" fill="#FFB900"/>
          </svg>
          Continue with Microsoft
        </button>
      </div>
    </div>
  </div>

  <div class="image-panel">
    <div class="image-overlay"></div>
    <img src="illinois.jpg" alt="University of Illinois" />
  </div>
</div>
